name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The dashboard build/typecheck scripts hard-code `dotenv -e ../../.env.local`,
      # so the file must exist. The committed placeholders are non-secret.
      - run: cp .env.example .env.local

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

      # SKIP_ENV_VALIDATION only takes effect during the Next build phase
      # (env.ts gates it on NEXT_PHASE === "phase-production-build"), so the
      # build uses placeholder env instead of failing the zod schema on the
      # empty .env.example values. No real secrets needed in CI.
      - run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "true"

      - run: pnpm test
